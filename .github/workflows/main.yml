name: "ci_demo"
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Node.js environment
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Display dist file
        run: ls -la && ls dist/
          
